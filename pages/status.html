<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Check your BM's Auto Spa booking status by plate number.">
    <title>Check Booking Status — BM's Auto Spa</title>
    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/status.css">
</head>

<body>

    <!-- Top Nav -->
    <nav class="topnav">
        <a href="/" class="topnav__logo">BM'S <span>Auto Spa</span></a>
        <div class="topnav__links">
            <a href="/" class="topnav__link">Book Now</a>
            <a href="/pages/status.html" class="topnav__link active">Check Status</a>
            <a href="/pages/login.html" class="topnav__link">Staff Login</a>
        </div>
    </nav>

    <main class="status-page">
        <div class="status-container">
            <h1 class="status-container__title">Check your booking.</h1>
            <p class="status-container__subtitle">Enter your car plate number to see your booking status.</p>

            <div class="status-search">
                <input type="text" id="plateSearch" class="form-input" placeholder="Enter plate number"
                    autocomplete="off">
                <button class="btn btn--primary" id="searchBtn">Search</button>
            </div>

            <div id="statusResult"></div>
        </div>
    </main>

    <script type="module" src="/js/status.js"></script>
</body>

</html>
